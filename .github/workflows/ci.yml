name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - run: go mod download
      - run: test -z "$(gofmt -l .)"
      - name: Validate
        shell: bash
        run: |
          set +e
          : > ci.log
          go vet ./... >> ci.log 2>&1
          vet_status=$?
          go test -race ./... >> ci.log 2>&1
          test_status=$?
          go build ./... >> ci.log 2>&1
          build_status=$?
          cat ci.log
          if (( vet_status != 0 || test_status != 0 || build_status != 0 )); then
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-log
          path: ci.log
