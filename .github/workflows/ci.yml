name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - name: Migrate configuration
        id: migrate_config
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        continue-on-error: true
        run: |
          {
            python scripts/migrate_point_groups_example.py
            sed -i '/^replace_once("config.example.yaml"/d' scripts/migrate_point_groups_config.py
            python scripts/migrate_point_groups_config.py
          } > config-migration.log 2>&1
      - name: Upload configuration migration log
        if: always() && github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        uses: actions/upload-artifact@v4
        with:
          name: config-migration-log
          path: config-migration.log
      - name: Check configuration migration
        if: steps.migrate_config.outcome == 'failure'
        run: exit 1
      - name: Migrate point commands
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        run: python scripts/migrate_point_groups_point.py
      - name: Migrate raw commands
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        run: python scripts/migrate_point_groups_client.py
      - name: Migrate multi commands
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        run: python scripts/migrate_point_groups_advanced.py
      - name: Migrate command surface
        id: migrate_app
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        continue-on-error: true
        run: |
          {
            sed -i '/^replace_once("internal\/cli\/completions.go"/d' scripts/migrate_point_groups_app.py
            python scripts/migrate_point_groups_app.py
            python scripts/migrate_point_groups_completions.py
          } > app-migration.log 2>&1
      - name: Upload command surface migration log
        if: always() && github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        uses: actions/upload-artifact@v4
        with:
          name: app-migration-log
          path: app-migration.log
      - name: Check command surface migration
        if: steps.migrate_app.outcome == 'failure'
        run: exit 1
      - name: Migrate documentation
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        run: python scripts/migrate_point_groups_docs.py
      - name: Format and tidy
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        run: |
          gofmt -w internal/cli internal/config
          go mod tidy
      - run: go mod download
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - name: Run race tests
        id: race_tests
        continue-on-error: true
        run: go test -race ./... > race-tests.log 2>&1
      - name: Upload race test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: race-test-log
          path: race-tests.log
      - name: Check race tests
        if: steps.race_tests.outcome == 'failure'
        run: exit 1
      - run: go build ./...
      - name: Commit verified source
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/point-groups-and-controls'
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add point groups and operation controls"
          git push origin HEAD:${{ github.head_ref }}
