default_profile: local
profiles:
  local:
    address: 192.168.1.10
    port: 44818
    path: "1,0"
    timeout: 5s
  micro800:
    address: 192.168.1.20
    port: 44818
    path: ""
    timeout: 5s
points:
  - name: motor_speed
    tag: Motor.Speed
    type: real
    elements: 1
    unit: rpm
    description: Motor shaft speed
  - name: motor_enabled
    tag: Motor.Enable
    type: bool
    elements: 1
    writable: true
    description: Motor enable command
